spring:
  application:
    name: deal
  profiles:
    active: prod

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/changelog-master.xml
    user: admin
    password: admin
    url: jdbc:postgresql://localhost:5433/deal_db
    default-schema: public

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5433/deal_db
    username: admin
    password: admin
  jpa:
    hibernate:
      ddl-auto: validate

calculator:
  service:
    base-url: http://calculator
    calc-credit-url: /calculator/calc
    calc-offers-url: /calculator/offers

logging:
  level:
    root: info
  pattern:
    console: "%d{HH:mm:ss} %-5level %logger{36} - %msg%n"