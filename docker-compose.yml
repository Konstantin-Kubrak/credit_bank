services:

  postgres-base:
    image: postgres:13
    container_name: some_postgres_base
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: deal_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
#    volumes:
#        - ./queries/create_extensions.sql:/docker-entrypoint-initdb.d/create_extensions.sql:ro
  zookeeper:
    image: confluentinc/cp-zookeeper:5.5.0
    hostname: some_zookeeper
    container_name: some_zookeeper
    ports:
      - "2182:2182"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2182
      ZOOKEEPER_TICK_TIMER: 2000

  kafka_broker:
    image:  confluentinc/cp-kafka:5.5.0
    hostname: some_kafka_broker
    container_name: some_kafka_broker
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "some_zookeeper:2182"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://some_kafka_broker:29092,PLAINTEXT_HOST://host.docker.internal:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0




